<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CoreCut - Projects</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--text:#f0f0f8;--muted:#8888aa;--accent:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--text)}
.header{display:flex;align-items:center;gap:14px;padding:0 20px;height:56px;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:800;color:#7c3aed}
.main{max-width:900px;margin:0 auto;padding:32px 20px}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
.sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.new-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;align-items:flex-end}
.new-row label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;display:block;margin-bottom:5px}
.new-row input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;width:260px;font-family:sans-serif}
.btn-new{background:#7c3aed;color:#fff;padding:10px 22px;border-radius:9px;font-size:14px;font-weight:600;border:none;cursor:pointer;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer}
.card:hover{border-color:var(--accent)}
.thumb{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--muted)}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:12px;color:var(--muted);margin-bottom:8px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;background:#1e3a5f;color:#60a5fa}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:15px}
.msg{position:fixed;top:68px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:10px;font-size:14px;font-weight:500;z-index:100;display:none}
.msg.ok{background:#14532d;color:#86efac;border:1px solid #22c55e}
.msg.err{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
</style>
</head>
<body>
<div class="header">
  <div class="logo">CoreCut</div>
</div>
<div class="main">
  <h1>My Projects</h1>
  <p class="sub">Create a project to start editing</p>
  <div class="new-row">
    <div>
      <label>Project Title</label>
      <input type="text" id="new-title" placeholder="My awesome video"/>
    </div>
    <button class="btn-new" id="create-btn">+ New Project</button>
  </div>
  <div id="grid" class="grid"><div class="empty">Loading projects...</div></div>
</div>
<div class="msg" id="msg"></div>

<script>
var API = 'https://matrixbh.app.n8n.cloud/webhook';
var USER_ID = 'guest-user-001';

function showMsg(text, ok) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = ok ? 'msg ok' : 'msg err';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 3000);
}

function loadProjects() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/app-projects?userId=' + USER_ID, true);
  xhr.onload = function() {
    var grid = document.getElementById('grid');
    try {
      var data = JSON.parse(xhr.responseText);
      var projects = data.projects || [];
      if (projects.length === 0) {
        grid.innerHTML = '<div class="empty">No projects yet. Create your first project above.</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        var date = p.created_at ? new Date(p.created_at).toLocaleDateString() : '';
        html += '<div class="card" onclick="window.location.href=\'../editor/?p=' + p.project_id + '\'">';
        html += '<div class="thumb">' + (p.video_url ? '<video src="' + p.video_url + '" muted style="width:100%;height:100%;object-fit:cover"></video>' : 'video') + '</div>';
        html += '<div class="card-title">' + (p.title || 'Untitled') + '</div>';
        html += '<div class="card-date">' + date + '</div>';
        html += '<span class="badge">' + (p.status || 'draft') + '</span>';
        html += '</div>';
      }
      grid.innerHTML = html;
    } catch(e) {
      grid.innerHTML = '<div class="empty">Failed to load projects.</div>';
    }
  };
  xhr.onerror = function() {
    document.getElementById('grid').innerHTML = '<div class="empty">Network error.</div>';
  };
  xhr.send();
}

document.getElementById('create-btn').addEventListener('click', function() {
  var title = document.getElementById('new-title').value.trim();
  if (!title) { showMsg('Enter a project title', false); return; }
  var btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API + '/app-create-project', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = '+ New Project';
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.project_id) {
        showMsg('Project created!', true);
        document.getElementById('new-title').value = '';
        loadProjects();
      } else {
        showMsg(data.error || 'Failed to create project', false);
      }
    } catch(e) { showMsg('Error', false); }
  };
  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = '+ New Project';
    showMsg('Network error', false);
  };
  xhr.send(JSON.stringify({ userId: USER_ID, title: title }));
});

loadProjects();
</script>
</body>
</html>
