<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CoreCut Editor</title>
<style>
:root{--bg:#0d0d12;--surface:#16161f;--surface2:#1e1e2a;--surface3:#252532;--border:#2d2d3d;--text:#f0f0f8;--muted:#8888aa;--accent:#7c3aed;--al:#a78bfa;--green:#22c55e;--red:#ef4444;--yellow:#eab308}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:17px;font-weight:900;color:var(--al)}
.back{color:var(--muted);font-size:12px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px}
.back:hover{color:var(--text)}
.sep{width:1px;height:22px;background:var(--border)}
.tb{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:5px}
.tb:hover{background:var(--surface2);color:var(--text)}
.proj-title{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;background:#1e3a5f;color:#60a5fa}
.ratio-row{display:flex;gap:3px}
.rb{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:700;padding:4px 7px;border-radius:5px;cursor:pointer}
.rb.active{background:rgba(124,58,237,.2);border-color:var(--accent);color:var(--al)}
.exp-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:12px;font-weight:700;padding:6px 16px;border-radius:7px;border:none;cursor:pointer}
.exp-btn:disabled{opacity:.5;cursor:not-allowed}
/* MAIN */
.main{flex:1;display:flex;overflow:hidden}
/* LEFT SIDEBAR */
.lsb{width:70px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:1px;flex-shrink:0;overflow-y:auto}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border-radius:7px;cursor:pointer;width:62px;border:none;background:none;color:var(--muted);font-size:9px;font-weight:600;text-align:center}
.ti:hover{background:var(--surface2);color:var(--text)}
.ti.on{background:rgba(124,58,237,.15);color:var(--al)}
.ti-ic{font-size:18px;line-height:1;margin-bottom:1px}
/* TOOL PANEL */
.tp{width:252px;background:var(--surface);border-right:1px solid var(--border);display:none;flex-direction:column;overflow:hidden}
.tp.open{display:flex}
.tph{padding:12px 14px 10px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tpc{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
.tpb{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.inp,.sel,.area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:12px;color:var(--text);outline:none;font-family:inherit}
.area{resize:vertical;min-height:72px}
.inp:focus,.sel:focus,.area:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;padding:9px;border-radius:7px;font-size:12px;font-weight:700;width:100%;border:none;cursor:pointer}
.btn:hover{background:#6d28d9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn2{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:7px;border-radius:7px;font-size:11px;font-weight:500;width:100%;cursor:pointer}
.btn2:hover{border-color:var(--accent);color:var(--al)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sopt{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 4px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center}
.sopt.on{border-color:var(--accent);color:var(--al);background:rgba(124,58,237,.12)}
.slrow{display:flex;align-items:center;gap:7px}
.slrow input[type=range]{flex:1;accent-color:var(--accent)}
.slv{font-size:11px;color:var(--muted);min-width:28px;text-align:right}
.res{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px}
.rl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.tcard{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 10px}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fo{border-radius:7px;overflow:hidden;cursor:pointer;border:2px solid transparent}
.fo.on{border-color:var(--accent)}
.ft{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.to{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.to.on{border-color:var(--accent);color:var(--al);background:rgba(124,58,237,.12)}
.spr{display:flex;gap:5px;flex-wrap:wrap}
.sp{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.sp.on{border-color:var(--accent);color:var(--al);background:rgba(124,58,237,.12)}
/* CENTER */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* PREVIEW */
.pva{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:12px;overflow:hidden;position:relative}
.pvb{background:#000;border-radius:10px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px var(--border),0 8px 32px rgba(0,0,0,.5)}
.pvb video,.pvb img{width:100%;height:100%;object-fit:contain;display:block}
.r9-16{aspect-ratio:9/16;max-height:100%;max-width:56%}
.r16-9{aspect-ratio:16/9;max-width:100%;max-height:100%}
.r1-1{aspect-ratio:1;max-width:100%;max-height:100%}
.r4-5{aspect-ratio:4/5;max-width:80%;max-height:100%}
.pve{color:var(--muted);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:7px;padding:20px;text-align:center}
.pveic{font-size:40px;opacity:.4}
.pvebtn{background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;margin-top:4px}
.capo{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:14px;font-weight:600;padding:5px 12px;border-radius:5px;text-align:center;max-width:88%;pointer-events:none;display:none}
.dropo{position:absolute;inset:0;background:rgba(124,58,237,.15);border:2px dashed var(--accent);border-radius:10px;display:none;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--al);pointer-events:none}
/* PLAYBACK */
.pbb{display:flex;align-items:center;gap:10px;padding:7px 14px;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.pbbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:5px}
.pbbtn:hover{color:var(--text);background:var(--surface2)}
.pbplay{background:var(--accent);color:#fff;border-radius:50%;width:32px;height:32px}
.pbplay:hover{background:#6d28d9}
.pbt{font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap}
.pbp{flex:1;height:4px;background:var(--surface3);border-radius:2px;cursor:pointer;position:relative}
.pbf{height:100%;background:var(--accent);border-radius:2px;width:0}
.pbh{position:absolute;top:-4px;width:12px;height:12px;background:#fff;border-radius:50%;margin-left:-6px;left:0;box-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none}
.pbvol{display:flex;align-items:center;gap:5px}
.pbvol input{width:56px;accent-color:var(--accent)}
.pbact{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;cursor:pointer}
.pbact:hover{border-color:var(--yellow);color:var(--yellow)}
/* TIMELINE */
.tla{height:186px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
.tlh{display:flex;align-items:center;padding:5px 12px;gap:7px;border-bottom:1px solid var(--border)}
.tll{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.tladd{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer}
.tladd:hover{color:var(--text);border-color:var(--accent)}
.tlzr{display:flex;align-items:center;gap:5px;margin-left:auto}
.tlzr button{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:13px;width:24px;height:24px;border-radius:4px;cursor:pointer}
.tlzl{font-size:10px;color:var(--muted);min-width:26px;text-align:center}
.tlt{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.tlrow{display:flex;align-items:center;height:38px}
.tlrl{width:72px;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:0 8px;flex-shrink:0;text-align:right}
.tltr{flex:1;height:30px;background:var(--surface2);position:relative}
.clip{position:absolute;top:2px;height:26px;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;border:1.5px solid}
.cv{background:#3b1d8a;border-color:#7c3aed;color:#c4b5fd}
.ca{background:#1a3a2a;border-color:#22c55e;color:#86efac}
.ct{background:#3a1a1a;border-color:#ef4444;color:#fca5a5}
.clip.sel{box-shadow:0 0 0 2px #fff}
.tlph{position:absolute;top:0;bottom:0;width:2px;background:var(--al);pointer-events:none;z-index:10}
/* TOAST */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;display:none;white-space:nowrap;pointer-events:none}
.tok{background:#14532d;color:#86efac;border:1px solid #22c55e}
.terr{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
.tinf{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">CoreCut</span>
  <button class="back" id="back-btn">← Projects</button>
  <div class="sep"></div>
  <button class="tb" id="undo-btn" title="Undo">↩</button>
  <button class="tb" id="redo-btn" title="Redo">↪</button>
  <div class="sep"></div>
  <span class="proj-title" id="proj-title">Loading…</span>
  <span class="badge" id="proj-badge">draft</span>
  <div class="sep"></div>
  <div class="ratio-row">
    <button class="rb" data-r="16-9">16:9</button>
    <button class="rb on" data-r="9-16">9:16</button>
    <button class="rb" data-r="1-1">1:1</button>
    <button class="rb" data-r="4-5">4:5</button>
  </div>
  <button class="exp-btn" id="exp-btn">Export ↑</button>
</div>

<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="lsb">
    <button class="ti" data-tool="media"><span class="ti-ic">📁</span>Media</button>
    <button class="ti" data-tool="text"><span class="ti-ic" style="font-weight:900;font-size:16px">T</span>Text</button>
    <button class="ti" data-tool="audio"><span class="ti-ic">♪</span>Audio</button>
    <button class="ti" data-tool="captions"><span class="ti-ic" style="font-size:13px;font-weight:800">CC</span>Captions</button>
    <button class="ti" data-tool="effects"><span class="ti-ic">✨</span>Effects</button>
    <button class="ti" data-tool="filter"><span class="ti-ic">🎨</span>Filter</button>
    <button class="ti" data-tool="transitions"><span class="ti-ic">⟶</span>Trans.</button>
    <button class="ti" data-tool="speed"><span class="ti-ic">⚡</span>Speed</button>
    <button class="ti" data-tool="ai-bg"><span class="ti-ic">✂️</span>BG Cut</button>
    <button class="ti" data-tool="ai-style"><span class="ti-ic">🎭</span>Stylize</button>
    <button class="ti" data-tool="tts"><span class="ti-ic">🎤</span>Voice</button>
  </div>

  <!-- TOOL PANEL -->
  <div class="tp" id="tp">
    <div class="tph">
      <span id="tp-title">Tool</span>
      <button class="tpc" id="tp-close">×</button>
    </div>
    <div class="tpb" id="tp-body"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <!-- PREVIEW -->
    <div class="pva" id="pva">
      <div class="pvb r9-16" id="pvb">
        <div class="pve" id="pve">
          <div class="pveic">🎬</div>
          <div>No media yet</div>
          <button class="pvebtn" id="import-btn">+ Import Video</button>
        </div>
        <div class="capo" id="capo"></div>
        <div class="dropo" id="dropo">Drop video here</div>
      </div>
      <input type="file" id="file-inp" style="display:none" accept="video/*,image/*"/>
    </div>

    <!-- PLAYBACK -->
    <div class="pbb">
      <button class="pbbtn" id="step-back" title="Step back">⏮</button>
      <button class="pbbtn pbplay" id="play-btn">▶</button>
      <button class="pbbtn" id="step-fwd" title="Step forward">⏭</button>
      <span class="pbt" id="pb-time">0:00 / 0:00</span>
      <div class="pbp" id="pb-prog">
        <div class="pbf" id="pb-fill"></div>
        <div class="pbh" id="pb-head"></div>
      </div>
      <div class="pbvol">
        <span style="font-size:13px;color:var(--muted)">🔊</span>
        <input type="range" id="vol-sl" min="0" max="100" value="80"/>
      </div>
      <button class="pbact" id="split-btn">✂ Split</button>
      <button class="pbact" id="del-btn" style="color:var(--muted)">🗑 Del</button>
    </div>

    <!-- TIMELINE -->
    <div class="tla">
      <div class="tlh">
        <span class="tll">Timeline</span>
        <button class="tladd" id="tl-add">+ Add Media</button>
        <div class="tlzr">
          <button id="zoom-out">−</button>
          <span class="tlzl" id="zoom-lbl">1×</span>
          <button id="zoom-in">+</button>
        </div>
      </div>
      <div class="tlt" id="tl-tracks"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
var API      = 'https://matrixbh.app.n8n.cloud/webhook';
var USER_ID  = 'guest-user-001';
var qs       = new URLSearchParams(location.search);
var projectId = qs.get('p');
var project  = null;
var activeTool = null;
var busy     = false;
var vid      = null;
var isPlaying = false;
var curRatio = '9-16';
var tlZoom   = 1;
var tlV = [], tlA = [], tlT = [];
var selClip  = null;
var totDur   = 30;
var capLines = [];
var audioTracks = [];
// tool state
var selStyle = 'anime';
var selVoice = 'nova';
var selSpeed = '1x';
var selTrans = 'cut';
var selFilter= 'None';
var selEffect= '';

if (!projectId) { location.href = '../projects/'; }

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, cls) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (cls || 'tok');
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.display = 'none'; }, 3500);
}

// ── Helpers ────────────────────────────────────────────────────
function fmt(s) {
  s = s || 0;
  var m = Math.floor(s / 60), sc = Math.floor(s % 60);
  return m + ':' + (sc < 10 ? '0' : '') + sc;
}
function el(id) { return document.getElementById(id); }

// ── Project ────────────────────────────────────────────────────
function loadProject() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/app-project-detail?projectId=' + encodeURIComponent(projectId), true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      project = d.project || d;
      el('proj-title').textContent = project.title || 'Untitled';
      el('proj-badge').textContent = project.status || 'draft';
      var src = project.render_url || project.stylized_video_url || project.processed_video_url || project.video_url;
      if (src) loadMedia(src, true);
      if (project.captions) parseSRT(project.captions);
    } catch(e) {}
  };
  xhr.send();
}

function loadMedia(src, isVid) {
  var bg = el('pvb'), em = el('pve');
  if (em) em.style.display = 'none';
  var old = bg.querySelector('video,img');
  if (old) old.remove();
  if (isVid) {
    vid = document.createElement('video');
    vid.src = src;
    vid.style.cssText = 'width:100%;height:100%;object-fit:contain';
    vid.addEventListener('timeupdate', onTick);
    vid.addEventListener('loadedmetadata', function() {
      totDur = vid.duration || 30;
      tlV = [{ id: 'main', start: 0, dur: totDur, lbl: (project && project.title) || 'Clip' }];
      if (project && project.tts_audio_url) tlA = [{ id: 'tts', start: 0, dur: totDur, lbl: 'Voiceover' }];
      if (project && project.captions)      tlT = [{ id: 'caps', start: 0, dur: totDur, lbl: 'Captions' }];
      renderTL();
    });
    vid.addEventListener('ended', function() { isPlaying = false; el('play-btn').textContent = '▶'; });
    bg.appendChild(vid);
  } else {
    var img = document.createElement('img');
    img.src = src; img.style.cssText = 'width:100%;height:100%;object-fit:contain';
    bg.appendChild(img);
  }
}

// ── Captions ───────────────────────────────────────────────────
function parseSRT(srt) {
  capLines = [];
  if (!srt) return;
  var blocks = srt.split(/\n\n+/);
  for (var i = 0; i < blocks.length; i++) {
    var ls = blocks[i].trim().split('\n');
    if (ls.length < 3) continue;
    var m = ls[1].match(/(\d+):(\d+):(\d+)[,.](\d+)\s*-->\s*(\d+):(\d+):(\d+)[,.](\d+)/);
    if (!m) continue;
    capLines.push({
      s: Number(m[1])*3600 + Number(m[2])*60 + Number(m[3]) + Number(m[4])/1000,
      e: Number(m[5])*3600 + Number(m[6])*60 + Number(m[7]) + Number(m[8])/1000,
      t: ls.slice(2).join(' ')
    });
  }
}
function updateCaps(t) {
  var ov = el('capo'), cur = null;
  for (var i = 0; i < capLines.length; i++) {
    if (t >= capLines[i].s && t <= capLines[i].e) { cur = capLines[i]; break; }
  }
  if (cur) { ov.textContent = cur.t; ov.style.display = 'block'; }
  else ov.style.display = 'none';
}

// ── Playback ───────────────────────────────────────────────────
function onTick() {
  if (!vid) return;
  var t = vid.currentTime, d = vid.duration || 1, pct = (t/d)*100;
  el('pb-fill').style.width = pct + '%';
  el('pb-head').style.left  = pct + '%';
  el('pb-time').textContent = fmt(t) + ' / ' + fmt(d);
  updateCaps(t);
  var ph = el('tl-ph'), inner = el('tl-inner');
  if (ph && inner) ph.style.left = (72 + (t/d) * (inner.offsetWidth - 72)) + 'px';
}
el('play-btn').addEventListener('click', function() {
  if (!vid) return;
  if (isPlaying) { vid.pause(); isPlaying = false; this.textContent = '▶'; }
  else           { vid.play();  isPlaying = true;  this.textContent = '⏸'; }
});
el('step-back').addEventListener('click', function() { if (vid) vid.currentTime = Math.max(0, vid.currentTime - 0.1); });
el('step-fwd').addEventListener('click',  function() { if (vid) vid.currentTime = Math.min(vid.duration, vid.currentTime + 0.1); });
el('pb-prog').addEventListener('click', function(e) {
  if (!vid) return;
  var r = this.getBoundingClientRect();
  vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
});
el('vol-sl').addEventListener('input', function() { if (vid) vid.volume = this.value / 100; });
el('undo-btn').addEventListener('click', function() { toast('Undo', 'tinf'); });
el('redo-btn').addEventListener('click', function() { toast('Redo', 'tinf'); });
el('back-btn').addEventListener('click', function() { location.href = '../projects/'; });

// ── Upload ─────────────────────────────────────────────────────
function triggerUpload() { el('file-inp').click(); }
el('import-btn').addEventListener('click', triggerUpload);
el('tl-add').addEventListener('click', triggerUpload);

el('file-inp').addEventListener('change', function() {
  var file = this.files[0]; if (!file) return;
  toast('Loading preview…', 'tinf');

});

// ── Timeline ───────────────────────────────────────────────────
function renderTL() {
  var pps = 80 * tlZoom;
  var tw  = Math.max(totDur * pps + 160, 560);
  var div = document.createElement('div');
  div.id = 'tl-inner';
  div.style.cssText = 'position:relative;width:' + tw + 'px;min-width:100%';

  // Ruler
  var ruler = document.createElement('div');
  ruler.style.cssText = 'height:20px;background:var(--surface2);border-bottom:1px solid var(--border);position:relative;margin-left:72px';
  var step = totDur > 120 ? 15 : totDur > 60 ? 10 : 5;
  for (var t = 0; t <= totDur + step; t += step) {
    var mk = document.createElement('div');
    mk.style.cssText = 'position:absolute;left:' + (t*pps) + 'px;top:0;display:flex;flex-direction:column;align-items:center';
    mk.innerHTML = '<span style="font-size:8px;color:var(--muted);font-family:monospace">' + fmt(t) + '</span><div style="width:1px;height:5px;background:var(--border);margin-top:2px"></div>';
    ruler.appendChild(mk);
  }
  div.appendChild(ruler);

  // Tracks
  div.appendChild(makeTrack('VIDEO', tlV, 'cv', pps));
  div.appendChild(makeTrack('AUDIO', tlA, 'ca', pps));
  div.appendChild(makeTrack('TEXT',  tlT, 'ct', pps));

  // Playhead
  var ph = document.createElement('div');
  ph.id = 'tl-ph'; ph.className = 'tlph';
  ph.style.cssText = 'left:72px';
  div.appendChild(ph);

  var wrap = el('tl-tracks');
  wrap.innerHTML = '';
  wrap.appendChild(div);
}
function makeTrack(label, clips, cls, pps) {
  var row = document.createElement('div'); row.className = 'tlrow';
  var lbl = document.createElement('div'); lbl.className = 'tlrl'; lbl.textContent = label;
  var tr  = document.createElement('div'); tr.className = 'tltr';
  for (var i = 0; i < clips.length; i++) {
    (function(c) {
      var x = c.start * pps, w = Math.max((c.dur || 5) * pps, 50);
      var clip = document.createElement('div');
      clip.className = 'clip ' + cls + (selClip === c.id ? ' sel' : '');
      clip.style.cssText = 'left:' + x + 'px;width:' + w + 'px';
      clip.textContent = c.lbl;
      clip.addEventListener('click', function() { selClip = selClip === c.id ? null : c.id; renderTL(); });
      tr.appendChild(clip);
    })(clips[i]);
  }
  row.appendChild(lbl); row.appendChild(tr);
  return row;
}

el('split-btn').addEventListener('click', function() {
  if (!vid || !selClip) { toast('Select a clip then position playhead', 'terr'); return; }
  var ct = vid.currentTime;
  for (var i = 0; i < tlV.length; i++) {
    if (tlV[i].id === selClip) {
      var orig = tlV[i];
      if (ct <= orig.start || ct >= orig.start + orig.dur) { toast('Playhead must be inside the clip', 'terr'); return; }
      var a = { id: orig.id+'-a', start: orig.start, dur: ct-orig.start, lbl: orig.lbl+' (1)' };
      var b = { id: orig.id+'-b', start: ct, dur: (orig.start+orig.dur)-ct, lbl: orig.lbl+' (2)' };
      tlV.splice(i, 1, a, b);
      selClip = null; renderTL(); toast('Split at ' + fmt(ct), 'tok');
      return;
    }
  }
  toast('Select a video clip to split', 'terr');
});
el('del-btn').addEventListener('click', function() {
  if (!selClip) { toast('Select a clip first', 'terr'); return; }
  tlV = tlV.filter(function(c) { return c.id !== selClip; });
  tlA = tlA.filter(function(c) { return c.id !== selClip; });
  tlT = tlT.filter(function(c) { return c.id !== selClip; });
  selClip = null; renderTL(); toast('Deleted', 'tok');
});

el('zoom-out').addEventListener('click', function() { tlZoom = Math.max(0.25, tlZoom - 0.25); el('zoom-lbl').textContent = tlZoom + '×'; renderTL(); });

function mkSlider(id, mn, mx, val, unit, div) {

  var sv = document.createElement('span'); sv.className = 'slv'; sv.id = id+'-v'; sv.textContent = (val/div).toFixed(div>1?1:0) + unit;

function mkGrid3(opts, grp, active) {

  });

function mkGridOpts(opts, selected, onChange) {
  var g = document.createElement('div'); g.className = 'g3';
  opts.forEach(function(o) {
    var b = document.createElement('button'); b.className = 'sopt' + (o===selected?' on':''); b.textContent = o;

}

// ── Audio Library ──────────────────────────────────────────────
function fetchAudio() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/app-audio-library', true);
  xhr.onload = function() {
    try { var d = JSON.parse(xhr.responseText); audioTracks = d.tracks || []; renderAudioList(audioTracks); }
    catch(e) { renderAudioList([]); }
  };
  xhr.onerror = function() { renderAudioList([]); };
  xhr.send();
}
function filterAudio() {
  var q = (el('aud-q') || {}).value || ''; q = q.toLowerCase();
  renderAudioList(audioTracks.filter(function(t) {
    return !q || (t.title||'').toLowerCase().indexOf(q)>=0 || (t.tags||'').toLowerCase().indexOf(q)>=0;
  }));
}
function renderAudioList(tracks) {
  var list = el('aud-list'); if (!list) return;
  list.innerHTML = '';
  if (!tracks.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:18px">No tracks found.</p>';
    return;
  }
  tracks.forEach(function(t) {
    var card = document.createElement('div'); card.className = 'tcard';
    var title = document.createElement('div'); title.className = 'tlrl'; title.style.cssText = 'font-size:12px;font-weight:600;color:var(--text);width:auto;text-align:left;padding:0'; title.textContent = t.title || 'Track';
    var sub = document.createElement('div'); sub.style.cssText = 'font-size:10px;color:var(--muted);margin-top:2px'; sub.textContent = (t.artist||'Unknown') + ' · ' + (t.duration_sec||0) + 's';
    card.appendChild(title); card.appendChild(sub);
    if (t.file_url) {
      var aud = document.createElement('audio'); aud.src = t.file_url; aud.controls = true;
      aud.style.cssText = 'width:100%;height:26px;margin:5px 0 3px'; card.appendChild(aud);
    }
    var addBtn = mkBtn('+ Add to Timeline', 'btn2'); card.appendChild(addBtn);
    addBtn.addEventListener('click', function() {
      tlA.push({ id: t.track_id || ('aud'+Date.now()), start: vid?vid.currentTime:0, dur: t.duration_sec||30, lbl: t.title||'Track' });
      renderTL(); toast('Added "' + (t.title||'Track') + '"', 'tok');
    });
    list.appendChild(card);
  });
}

// ── AI Actions ─────────────────────────────────────────────────
function runAI(action) {
  if (busy) return;
  busy = true;
  var btnId = { captions:'ai-capbtn', tts:'ai-ttsbtn', bg:'ai-bgbtn', style:'ai-stbtn' };
  var origTxt = { captions:'Generate Captions', tts:'Generate Voiceover', bg:'Remove Background', style:'Apply Style' };
  var btn = el(btnId[action]);
  if (btn) { btn.disabled = true; btn.textContent = 'Processing…'; }

  var url, body;
  if (action === 'captions') {
    var lang = (el('cap-lang') || {}).value || 'en';
    url  = API + '/app-ai-captions';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, language: lang });
  } else if (action === 'tts') {
    var txt = (el('tts-txt') || {}).value || '';
    if (!txt.trim()) { toast('Enter a script first', 'terr'); busy = false; if (btn) { btn.disabled = false; btn.textContent = origTxt[action]; } return; }
    url  = API + '/app-ai-tts';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, text: txt, voice: selVoice });
  } else if (action === 'bg') {
    url  = API + '/app-ai-remove-bg';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID });
  } else if (action === 'style') {
    url  = API + '/app-ai-stylize';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, style: selStyle });
  }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    busy = false;
    if (btn) { btn.disabled = false; btn.textContent = origTxt[action]; }
    try {
      var d = JSON.parse(xhr.responseText);
      var msgs = { captions:'Captions started — check in 30s', tts:'Voiceover created!', bg:'Background removed!', style:'Stylization done!' };
      if (xhr.status >= 200 && xhr.status < 300) {
        toast(msgs[action] || 'Done!', 'tok');
        setTimeout(function() { loadProject(); drawTool(); }, 1500);
      } else { toast(d.error || 'Error ' + xhr.status, 'terr'); }
    } catch(e) { toast('Response error', 'terr'); }
  };
  xhr.onerror = function() { busy = false; if (btn) { btn.disabled = false; btn.textContent = origTxt[action]; } toast('Network error', 'terr'); };
  xhr.send(body);
}

// ── Export ─────────────────────────────────────────────────────
el('exp-btn').addEventListener('click', function() {
  if (busy) { toast('Already processing…', 'tinf'); return; }
  if (!project && !vid) { toast('Import a video first', 'terr'); return; }
  busy = true;
  var btn = el('exp-btn'); btn.textContent = 'Exporting…'; btn.disabled = true;
  var speed = parseFloat(selSpeed) || 1;
  var src = (project && project.video_url) || '';
  var clips = tlV.length
    ? tlV.map(function(c) { return { asset:{type:'video',src:src}, start:c.start, length:c.dur||15, speed:speed }; })
    : [{ asset:{type:'video',src:src}, start:0, length:15, speed:speed }];
  var edit = { clips:clips, output:{format:'mp4',resolution:'hd',aspectRatio:curRatio.replace('-',':')} };
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API + '/app-render-video', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    busy = false; btn.textContent = 'Export ↑'; btn.disabled = false;
    try {
      var d = JSON.parse(xhr.responseText);
      if (xhr.status >= 200 && xhr.status < 300) { toast('Render started! Check back in ~60s.', 'tok'); setTimeout(loadProject, 8000); }
      else toast(d.error || 'Render failed', 'terr');
    } catch(e) { toast('Render error', 'terr'); }
  };
  xhr.onerror = function() { busy = false; btn.textContent = 'Export ↑'; btn.disabled = false; toast('Network error', 'terr'); };
  xhr.send(JSON.stringify({ projectId:projectId, userId:USER_ID, edit:edit }));
});

// ── Init ───────────────────────────────────────────────────────
renderTL();
loadProject();
</script>
