<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CoreCut - Sign In</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--text:#f0f0f8;--muted:#8888aa;--accent:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:400px}
.logo{font-size:26px;font-weight:800;color:#7c3aed;margin-bottom:8px}
h1{font-size:22px;font-weight:700;margin-bottom:24px}
.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border-radius:8px;font-size:14px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border:none;background:none}
.tab.active{background:var(--accent);color:#fff}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;font-size:14px;color:var(--text);outline:none;font-family:sans-serif}
.field input:focus{border-color:var(--accent)}
.btn{background:#7c3aed;color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:700;width:100%;margin-top:6px;border:none;cursor:pointer;font-family:sans-serif}
.btn:hover{background:#6d28d9}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-top:12px;display:none}
.msg.ok{background:#14532d;color:#86efac;border:1px solid #22c55e}
.msg.err{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CoreCut</div>
  <h1 id="title">Welcome back</h1>
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>
  <div id="name-field" class="field" style="display:none">
    <label>Full Name</label>
    <input type="text" id="inp-name" placeholder="Your name"/>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="inp-email" placeholder="you@example.com"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="text" id="inp-pw" placeholder="Enter your password" style="-webkit-text-security:disc"/>
  </div>
  <button class="btn" id="main-btn" onclick="handleAuth()">Sign In</button>
  <div class="msg" id="msg"></div>
</div>

<script>
var API = 'https://matrixbh.app.n8n.cloud/webhook';
var mode = 'login';

function switchTab(t) {
  mode = t;
  document.getElementById('tab-login').className = (t === 'login') ? 'tab active' : 'tab';
  document.getElementById('tab-register').className = (t === 'register') ? 'tab active' : 'tab';
  document.getElementById('name-field').style.display = (t === 'register') ? 'block' : 'none';
  document.getElementById('title').textContent = (t === 'login') ? 'Welcome back' : 'Create account';
  document.getElementById('main-btn').textContent = (t === 'login') ? 'Sign In' : 'Create Account';
  document.getElementById('msg').style.display = 'none';
}

function showMsg(text, ok) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = ok ? 'msg ok' : 'msg err';
  el.style.display = 'block';
}

function handleAuth() {
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var name = document.getElementById('inp-name').value.trim();

  if (!email || !pw) {
    showMsg('Email and password are required', false);
    return;
  }

  var btn = document.getElementById('main-btn');
  btn.disabled = true;
  btn.textContent = 'Please wait...';

  var url = (mode === 'login') ? API + '/app-login' : API + '/app-register';
  var payload = (mode === 'login')
    ? JSON.stringify({ email: email, password: pw })
    : JSON.stringify({ email: email, password: pw, name: name });

  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');

  xhr.onload = function() {
    btn.disabled = false;
    btn.textContent = (mode === 'login') ? 'Sign In' : 'Create Account';
    try {
      var data = JSON.parse(xhr.responseText);
      var uid = data.user_id || data.userId;
      if (xhr.status >= 200 && xhr.status < 300 && uid) {
        localStorage.setItem('userId', uid);
        localStorage.setItem('userName', data.name || email);
        showMsg((mode === 'login') ? 'Welcome back!' : 'Account created!', true);
        setTimeout(function() { window.location.href = '../projects/'; }, 900);
      } else {
        showMsg(data.error || data.message || 'Something went wrong', false);
      }
    } catch(e) {
      showMsg('Error reading response', false);
    }
  };

  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = (mode === 'login') ? 'Sign In' : 'Create Account';
    showMsg('Network error - check your connection', false);
  };

  xhr.send(payload);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleAuth();
});

if (localStorage.getItem('userId')) {
  window.location.href = '../projects/';
}
</script>
</body>
</html>
