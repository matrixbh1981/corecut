<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CoreCut - Editor</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--text:#f0f0f8;--muted:#8888aa;--accent:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.back{color:var(--muted);font-size:13px;cursor:pointer;background:none;border:none;padding:6px 10px;border-radius:8px}
.back:hover{color:var(--text)}
.proj-title{flex:1;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;background:#1e3a5f;color:#60a5fa}
.dl-btn{background:#22c55e;color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;text-decoration:none;display:none}
.workspace{flex:1;display:flex;overflow:hidden}
.preview{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.video-box{background:#000;border-radius:12px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;overflow:hidden}
.upload-box{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer}
.upload-box:hover{border-color:var(--accent)}
.upload-box p{color:var(--muted);font-size:14px;margin-top:8px}
.result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.result-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sidebar{width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tools{padding:8px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.tool{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;text-align:left;width:100%}
.tool:hover{background:var(--surface2)}
.tool.active{background:rgba(124,58,237,0.15);color:#a78bfa}
.panel{flex:1;padding:16px;overflow-y:auto;display:none;flex-direction:column;gap:10px}
.panel.open{display:flex}
.panel h3{font-size:15px;font-weight:700}
.panel label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;margin-top:8px}
.panel select,.panel textarea,.panel input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);outline:none;font-family:sans-serif}
.panel textarea{resize:vertical}
.act-btn{background:#7c3aed;color:#fff;padding:11px;border-radius:9px;font-size:14px;font-weight:600;width:100%;border:none;cursor:pointer;margin-top:4px}
.act-btn:disabled{opacity:0.6;cursor:not-allowed}
.style-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.sopt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 6px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center}
.sopt.active{border-color:var(--accent);color:var(--text);background:rgba(124,58,237,0.15)}
.msg{position:fixed;top:62px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;display:none}
.msg.ok{background:#14532d;color:#86efac;border:1px solid #22c55e}
.msg.err{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="window.location.href='../projects/'">Back</button>
  <span class="proj-title" id="proj-title">Loading...</span>
  <span class="badge" id="proj-badge">draft</span>
  <a class="dl-btn" id="dl-btn" href="#" target="_blank">Download</a>
</div>
<div class="msg" id="msg"></div>
<div class="workspace">
  <div class="preview">
    <div class="video-box" id="video-box">No video yet</div>
    <div class="upload-box" id="upload-box">
      <input type="file" id="file-inp" style="display:none" accept="video/*,image/*"/>
      <div style="font-size:36px;color:var(--muted)">+</div>
      <p>Click to upload video or image</p>
    </div>
    <div id="results"></div>
  </div>
  <div class="sidebar">
    <div class="tools">
      <button class="tool" id="t-captions" onclick="openPanel('captions')">CC &nbsp; Auto Captions</button>
      <button class="tool" id="t-tts" onclick="openPanel('tts')">Mic &nbsp; Text to Speech</button>
      <button class="tool" id="t-bg" onclick="openPanel('bg')">Cut &nbsp; Remove Background</button>
      <button class="tool" id="t-style" onclick="openPanel('style')">Art &nbsp; Stylize Video</button>
      <button class="tool" id="t-audio" onclick="openPanel('audio')">Note &nbsp; Audio Library</button>
      <button class="tool" id="t-render" onclick="openPanel('render')">Up &nbsp; Export and Render</button>
    </div>
    <div class="panel" id="panel"></div>
  </div>
</div>

<script>
var API = 'https://matrixbh.app.n8n.cloud/webhook';
var USER_ID = 'guest-user-001';
var params = new URLSearchParams(window.location.search);
var projectId = params.get('p');
var project = null;
var activePanel = null;
var busy = false;
var selStyle = 'anime';
var selLang = 'en';
var selVoice = 'nova';
var audioTracks = [];

if (!projectId) { window.location.href = '../projects/'; }

function showMsg(text, ok) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = ok ? 'msg ok' : 'msg err';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 4000);
}

function renderProject() {
  if (!project) return;
  document.getElementById('proj-title').textContent = project.title || 'Untitled';
  document.getElementById('proj-badge').textContent = project.status || 'draft';
  var src = project.render_url || project.stylized_video_url || project.video_url;
  if (src) {
    document.getElementById('video-box').innerHTML = '<video src="' + src + '" controls style="width:100%;height:100%;object-fit:contain"></video>';
  }
  if (project.render_url) {
    var dl = document.getElementById('dl-btn');
    dl.href = project.render_url;
    dl.style.display = 'block';
  }
  var html = '';
  if (project.captions) {
    html += '<div class="result"><div class="result-label">Captions</div><pre style="font-size:12px;color:var(--muted);white-space:pre-wrap;max-height:100px;overflow-y:auto">' + project.captions.substring(0,300) + '</pre></div>';
  }
  if (project.tts_audio_url) {
    html += '<div class="result"><div class="result-label">Voiceover</div><audio src="' + project.tts_audio_url + '" controls style="width:100%;height:34px"></audio></div>';
  }
  if (project.no_bg_image_url) {
    html += '<div class="result"><div class="result-label">Background Removed</div><img src="' + project.no_bg_image_url + '" style="max-height:100px;border-radius:6px"></div>';
  }
  document.getElementById('results').innerHTML = html;
}

function loadProject() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/app-project-detail?projectId=' + projectId, true);
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      project = data.project || data;
      renderProject();
    } catch(e) {}
  };
  xhr.send();
}

document.getElementById('upload-box').addEventListener('click', function() {
  document.getElementById('file-inp').click();
});

document.getElementById('file-inp').addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  showMsg('Uploading...', true);
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    var xhr = new XMLHttpRequest();
    xhr.open('POST', API + '/app-upload', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.video_url || data.file_url) { showMsg('Uploaded!', true); loadProject(); }
        else showMsg(data.error || 'Upload failed', false);
      } catch(e) { showMsg('Error', false); }
    };
    xhr.onerror = function() { showMsg('Network error', false); };
    xhr.send(JSON.stringify({ userId: USER_ID, projectId: projectId, fileName: file.name, fileType: file.type, fileData: base64 }));
  };
  reader.readAsDataURL(file);
});

function openPanel(name) {
  activePanel = (activePanel === name) ? null : name;
  var tools = document.querySelectorAll('.tool');
  for (var i = 0; i < tools.length; i++) { tools[i].classList.remove('active'); }
  var panel = document.getElementById('panel');
  if (!activePanel) { panel.className = 'panel'; return; }
  document.getElementById('t-' + name).classList.add('active');
  panel.className = 'panel open';
  drawPanel();
}

function drawPanel() {
  var p = document.getElementById('panel');
  if (!activePanel) return;

  if (activePanel === 'captions') {
    p.innerHTML = '<h3>Auto Captions</h3><label>Language</label><select id="sel-lang"><option value="en">English</option><option value="ar">Arabic</option><option value="fr">French</option><option value="es">Spanish</option><option value="de">German</option></select><button class="act-btn" id="act-btn">Generate Captions</button>' + (project && project.captions ? '<pre style="font-size:12px;color:var(--muted);white-space:pre-wrap;margin-top:8px;max-height:160px;overflow-y:auto;background:var(--surface2);padding:10px;border-radius:8px">' + project.captions + '</pre>' : '');
    document.getElementById('sel-lang').value = selLang;
    document.getElementById('sel-lang').onchange = function(){ selLang = this.value; };
    document.getElementById('act-btn').addEventListener('click', function(){ runAction('captions'); });
  }
  else if (activePanel === 'tts') {
    p.innerHTML = '<h3>Text to Speech</h3><label>Script</label><textarea id="tts-txt" rows="5" placeholder="Your voiceover script..."></textarea><label>Voice</label><select id="sel-voice"><option value="alloy">alloy</option><option value="echo">echo</option><option value="fable">fable</option><option value="onyx">onyx</option><option value="nova">nova</option><option value="shimmer">shimmer</option></select><button class="act-btn" id="act-btn">Generate Voiceover</button>' + (project && project.tts_audio_url ? '<audio src="' + project.tts_audio_url + '" controls style="width:100%;height:34px;margin-top:8px"></audio>' : '');
    document.getElementById('sel-voice').value = selVoice;
    document.getElementById('sel-voice').onchange = function(){ selVoice = this.value; };
    document.getElementById('act-btn').addEventListener('click', function(){ runAction('tts'); });
  }
  else if (activePanel === 'bg') {
    p.innerHTML = '<h3>Remove Background</h3><p style="font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px">Removes background from your source image using AI.</p><button class="act-btn" id="act-btn" style="margin-top:14px">Remove Background</button>' + (project && project.no_bg_image_url ? '<img src="' + project.no_bg_image_url + '" style="width:100%;border-radius:8px;margin-top:8px">' : '');
    document.getElementById('act-btn').addEventListener('click', function(){ runAction('bg'); });
  }
  else if (activePanel === 'style') {
    p.innerHTML = '<h3>Stylize Video</h3><div class="style-row"><button class="sopt' + (selStyle==='anime'?' active':'') + '" id="s-anime">Anime</button><button class="sopt' + (selStyle==='3d'?' active':'') + '" id="s-3d">3D</button><button class="sopt' + (selStyle==='neon'?' active':'') + '" id="s-neon">Neon</button></div><button class="act-btn" id="act-btn">Apply Style</button>' + (project && project.stylized_video_url ? '<video src="' + project.stylized_video_url + '" controls style="width:100%;border-radius:8px;margin-top:8px"></video>' : '');
    document.getElementById('s-anime').addEventListener('click', function(){ selStyle='anime'; drawPanel(); });
    document.getElementById('s-3d').addEventListener('click', function(){ selStyle='3d'; drawPanel(); });
    document.getElementById('s-neon').addEventListener('click', function(){ selStyle='neon'; drawPanel(); });
    document.getElementById('act-btn').addEventListener('click', function(){ runAction('style'); });
  }
  else if (activePanel === 'audio') {
    p.innerHTML = '<h3>Audio Library</h3><input type="text" id="aud-search" placeholder="Search tracks..."/><div id="aud-list" style="margin-top:10px;display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto"><p style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Loading...</p></div>';
    document.getElementById('aud-search').addEventListener('input', filterAudio);
    if (audioTracks.length === 0) fetchAudio(); else renderAudio(audioTracks);
  }
  else if (activePanel === 'render') {
    p.innerHTML = '<h3>Export and Render</h3><p style="font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px">Renders HD MP4 via Shotstack (30-60 seconds).</p><button class="act-btn" id="act-btn" style="margin-top:14px">Start Render</button>' + (project && project.render_url ? '<a href="' + project.render_url + '" target="_blank" style="display:block;background:#22c55e;color:#fff;text-align:center;padding:10px;border-radius:8px;margin-top:8px;font-weight:600;font-size:14px">Download Video</a><video src="' + project.render_url + '" controls style="width:100%;border-radius:8px;margin-top:8px"></video>' : '');
    document.getElementById('act-btn').addEventListener('click', function(){ runAction('render'); });
  }
}

function fetchAudio() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API + '/app-audio-library', true);
  xhr.onload = function() {
    try { var d = JSON.parse(xhr.responseText); audioTracks = d.tracks || []; renderAudio(audioTracks); } catch(e) {}
  };
  xhr.send();
}

function filterAudio() {
  var q = document.getElementById('aud-search').value.toLowerCase();
  var filtered = audioTracks.filter(function(t){ return !q || t.title.toLowerCase().indexOf(q) >= 0 || (t.tags || '').toLowerCase().indexOf(q) >= 0; });
  renderAudio(filtered);
}

function renderAudio(tracks) {
  var el = document.getElementById('aud-list');
  if (!el) return;
  if (!tracks.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:20px">No tracks found.</p>'; return; }
  var html = '';
  for (var i = 0; i < tracks.length; i++) {
    var t = tracks[i];
    html += '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px">';
    html += '<div style="font-size:13px;font-weight:600">' + t.title + '</div>';
    html += '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + (t.artist||'') + ' - ' + (t.duration_sec||0) + 's</div>';
    if (t.file_url) html += '<audio src="' + t.file_url + '" controls style="width:100%;height:30px;margin-top:6px"></audio>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function runAction(action) {
  if (busy) return;
  busy = true;
  var btn = document.getElementById('act-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }

  var url, body;
  if (action === 'captions') {
    url = API + '/app-ai-captions';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, language: selLang });
  } else if (action === 'tts') {
    var txt = document.getElementById('tts-txt') ? document.getElementById('tts-txt').value.trim() : '';
    if (!txt) { showMsg('Enter some text', false); busy = false; if (btn) { btn.disabled = false; btn.textContent = 'Generate Voiceover'; } return; }
    url = API + '/app-ai-tts';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, text: txt, voice: selVoice });
  } else if (action === 'bg') {
    url = API + '/app-ai-remove-bg';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID });
  } else if (action === 'style') {
    url = API + '/app-ai-stylize';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, style: selStyle });
  } else if (action === 'render') {
    if (!project || !project.video_url) { showMsg('Upload a video first', false); busy = false; if (btn) { btn.disabled = false; btn.textContent = 'Start Render'; } return; }
    url = API + '/app-render-video';
    body = JSON.stringify({ projectId: projectId, userId: USER_ID, edit: { clips: [{ asset: { type: 'video', src: project.video_url }, start: 0, length: 15 }], output: { format: 'mp4', resolution: 'hd' } } });
  }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    busy = false;
    try {
      var data = JSON.parse(xhr.responseText);
      if (xhr.status >= 200 && xhr.status < 300) {
        var msgs = { captions: 'Captions started - check back in 30s', tts: 'Voiceover generated!', bg: 'Background removed!', style: 'Video stylized!', render: 'Render complete!' };
        showMsg(msgs[action] || 'Done!', true);
        setTimeout(loadProject, 1500);
      } else {
        showMsg(data.error || 'Something went wrong', false);
      }
    } catch(e) { showMsg('Error reading response', false); }
    drawPanel();
  };
  xhr.onerror = function() {
    busy = false;
    showMsg('Network error', false);
    drawPanel();
  };
  xhr.send(body);
}

loadProject();
</script>
</body>
</html>
